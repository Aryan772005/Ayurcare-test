<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Ayurve | Ayurvedic Health & Wellness Platform</title>
    <meta name="description" content="Nexus Ayurve - Your complete Ayurvedic health and wellness platform with AI-powered consultations, calorie tracking, and personalized wellness plans." />

    <!-- Open Graph / LinkedIn Preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nexus Ayurve | Ayurvedic Health & Wellness Platform" />
    <meta property="og:description" content="Your complete Ayurvedic health and wellness platform with AI-powered consultations, calorie tracking, and personalized wellness plans." />
    <meta property="og:url" content="https://Nexus Ayurve-test.vercel.app" />
    <meta property="og:site_name" content="Nexus Ayurve" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nexus Ayurve | Ayurvedic Health & Wellness Platform" />
    <meta name="twitter:description" content="Your complete Ayurvedic health and wellness platform with AI-powered consultations, calorie tracking, and personalized wellness plans." />

    <!-- Google Translate Script -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,hi',
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </head>
  <body>
    <!-- Hidden element required for Google Translate to function -->
    <div id="google_translate_element" style="display: none;"></div>
    
    <script>
      (function() {
        var theme = localStorage.getItem('theme');
        if (theme !== 'dark') document.body.classList.add('light-mode');
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
